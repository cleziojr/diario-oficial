services:
  postgres:
    image: postgres:16-alpine
    container_name: diario-oficial-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diario}
      POSTGRES_DB: ${POSTGRES_DB:-diario_oficial}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diario} -d ${POSTGRES_DB:-diario_oficial}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
